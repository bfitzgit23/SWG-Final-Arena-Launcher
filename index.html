<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SWG - A Final Arena Launcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* optional: prevents accidental text selection on buttons */
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Orbitron', 'Exo 2', 'Rajdhani', monospace;
            background: #0a0505;
        }

        /* ---------- MAIN ARENA BACKGROUND ---------- */
        .arena-background {
            position: relative;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 50% 30%, #2a1210 0%, #0a0505 100%);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Sand texture overlay */
        .sand-texture {
            position: absolute;
            inset: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.08"><path fill="none" d="M0 0h200v200H0z"/><circle cx="30" cy="40" r="2" fill="%23ffaa55"/><circle cx="80" cy="20" r="1.5" fill="%23ffaa55"/><circle cx="150" cy="70" r="2.5" fill="%23ffaa55"/><circle cx="170" cy="130" r="1.8" fill="%23ffaa55"/><circle cx="45" cy="160" r="2" fill="%23ffaa55"/><circle cx="120" cy="180" r="1.2" fill="%23ffaa55"/><circle cx="190" cy="40" r="1.5" fill="%23ffaa55"/><circle cx="10" cy="90" r="2" fill="%23ffaa55"/><circle cx="100" cy="110" r="2.2" fill="%23ffaa55"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
        }

        /* Arena rings (floor markings) */
        .arena-rings {
            position: absolute;
            bottom: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 150%;
            height: 80%;
            background: repeating-radial-gradient(circle at 50% 80%, rgba(255, 100, 20, 0.12) 0px, rgba(255, 100, 20, 0.12) 2px, transparent 2px, transparent 120px);
            pointer-events: none;
            border-radius: 50%;
        }

        /* Gladiator columns (sides) */
        .column-left, .column-right {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 120px;
            background: linear-gradient(90deg, rgba(20, 8, 5, 0.6), rgba(0,0,0,0));
            pointer-events: none;
        }
        .column-left {
            left: 0;
            background: linear-gradient(90deg, rgba(30, 15, 10, 0.5), transparent);
            border-right: 1px solid rgba(255, 100, 20, 0.3);
        }
        .column-right {
            right: 0;
            background: linear-gradient(-90deg, rgba(30, 15, 10, 0.5), transparent);
            border-left: 1px solid rgba(255, 100, 20, 0.3);
        }

        /* Floating embers / sparks */
        .ember {
            position: absolute;
            bottom: -20px;
            background: radial-gradient(circle, #ffaa44, #ff4400);
            border-radius: 50%;
            filter: blur(2px);
            opacity: 0.8;
            pointer-events: none;
            animation: floatUp linear infinite;
            z-index: 2;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0.9;
            }
            100% {
                transform: translateY(-110vh) scale(0.2);
                opacity: 0;
            }
        }

        /* ---------- MAIN UI PANEL (Glassmorphism) ---------- */
        .launcher-container {
            position: relative;
            width: 750px;
            max-width: 85vw;
            background: rgba(20, 10, 8, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            border: 1px solid rgba(255, 100, 30, 0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 30px rgba(255, 80, 0, 0.2);
            padding: 28px 24px;
            transition: all 0.2s ease;
            z-index: 10;
        }

        /* TITLE SECTION */
        .title-section {
            text-align: center;
            margin-bottom: 32px;
            border-bottom: 1px solid rgba(255, 100, 30, 0.4);
            padding-bottom: 18px;
        }

        .main-title {
            font-family: 'Orbitron', 'Bebas Neue', monospace;
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #ffcc88, #ff6600, #cc3300);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(255, 80, 0, 0.6);
            margin-bottom: 6px;
        }

        .sub {
            font-size: 0.8rem;
            letter-spacing: 6px;
            color: #ffaa66;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* BUTTON GRID - exactly as original layout */
        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 24px 0 28px;
        }

        .launcher-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 120, 40, 0.5);
            padding: 14px 12px;
            border-radius: 14px;
            text-align: center;
            transition: all 0.2s ease;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .launcher-btn .main {
            font-size: 1.2rem;
            color: #fff;
            display: block;
            font-weight: 600;
        }

        .launcher-btn .sub {
            font-size: 0.7rem;
            color: #ffaa77;
            letter-spacing: 1px;
            margin-top: 4px;
            display: block;
        }

        .launcher-btn:hover {
            background: rgba(255, 100, 30, 0.25);
            border-color: #ff8844;
            box-shadow: 0 0 12px rgba(255, 100, 0, 0.4);
            transform: translateY(-2px);
        }

        .launcher-btn:active {
            transform: translateY(1px);
        }

        /* Special pause style */
        .pause-btn {
            border-color: #ff8844;
        }
        .pause-btn:hover {
            background: rgba(255, 100, 30, 0.4);
        }

        /* Status & logs area */
        .info-area {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 18px;
            padding: 14px 18px;
            margin-top: 12px;
            border-left: 3px solid #ff8844;
        }

        .pauli-line {
            font-family: monospace;
            color: #ffaa66;
            font-size: 0.85rem;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .progress-track {
            background: rgba(255, 100, 30, 0.2);
            border-radius: 30px;
            height: 6px;
            width: 100%;
            margin: 12px 0 8px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff8844, #ffcc66);
            border-radius: 30px;
            box-shadow: 0 0 6px #ffaa44;
            transition: width 0.3s ease;
        }

        .file-status {
            display: flex;
            justify-content: space-between;
            color: #ddccaa;
            font-size: 0.8rem;
            font-family: monospace;
            margin-top: 8px;
        }

        .ready-text {
            color: #ffaa66;
            font-weight: bold;
            text-transform: uppercase;
            animation: pulseReady 1.8s infinite;
        }

        @keyframes pulseReady {
            0% { text-shadow: 0 0 0px #ff8844; opacity: 0.8; }
            50% { text-shadow: 0 0 8px #ff8844; opacity: 1; }
            100% { text-shadow: 0 0 0px #ff8844; opacity: 0.8; }
        }

        /* ---------- COLOR ADJUSTMENT CONTROLS (embedded demo) ---------- */
        .color-palette-demo {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 12px;
            color: #ccc;
            display: flex;
            gap: 20px;
            z-index: 20;
            font-family: monospace;
            border: 1px solid rgba(255,100,0,0.4);
        }

        .color-palette-demo label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        input[type="color"] {
            width: 28px;
            height: 28px;
            border: 1px solid #ff8844;
            border-radius: 50%;
            background: transparent;
            cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 700px) {
            .launcher-container { padding: 20px 16px; }
            .main-title { font-size: 1.8rem; }
            .button-grid { gap: 12px; }
            .launcher-btn .main { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="arena-background" id="arenaBg">
    <!-- Textures / arena imagery -->
    <div class="sand-texture"></div>
    <div class="arena-rings"></div>
    <div class="column-left"></div>
    <div class="column-right"></div>

    <!-- Dynamic embers (JS will generate) -->

    <!-- Main launcher UI panel -->
    <div class="launcher-container">
        <div class="title-section">
            <div class="main-title">SWG - A FINAL ARENA</div>
            <div class="sub">GLADIATOR'S LAST STAND</div>
        </div>

        <!-- Button grid exactly matching original design but enhanced -->
        <div class="button-grid">
            <div class="launcher-btn" id="fullScanBtn">
                <span class="main">FULL SCAN</span>
                <span class="sub">(RECHECK ALL)</span>
            </div>
            <div class="launcher-btn" id="installBtn">
                <span class="main">INSTALL</span>
                <span class="sub">LOCATION</span>
            </div>
            <div class="launcher-btn" id="settingsBtn">
                <span class="main">SETTINGS</span>
                <span class="sub"></span>
            </div>
            <div class="launcher-btn pause-btn" id="pauseBtn">
                <span class="main">PAUSE SCAN</span>
                <span class="sub"></span>
            </div>
            <div class="launcher-btn" id="clearCacheBtn">
                <span class="main">CLEAR CACHE</span>
                <span class="sub"></span>
            </div>
            <div class="launcher-btn" id="viewLogsBtn">
                <span class="main">VIEW LOGS</span>
                <span class="sub"></span>
            </div>
        </div>

        <!-- Status area -->
        <div class="info-area">
            <div class="pauli-line">Pauli nonate • arena protocol active</div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="file-status">
                <span id="fileCount">0/0 files</span>
                <span class="ready-text" id="readyStatus">Ready</span>
            </div>
        </div>
    </div>

    <!-- Live color adjustment tool (to meet "adjust colors" request) -->
    <div class="color-palette-demo">
        <label>🎨 Primary Accent
            <input type="color" id="accentColor" value="#ff6600">
        </label>
        <label>🌑 Background Base
            <input type="color" id="bgBaseColor" value="#2a1210">
        </label>
        <span style="font-size:10px;">(changes real-time)</span>
    </div>
</div>

<script>
    // -------- Generate floating embers (arena atmosphere) --------
    function createEmber() {
        const ember = document.createElement('div');
        ember.classList.add('ember');
        const size = Math.random() * 8 + 3;
        ember.style.width = size + 'px';
        ember.style.height = size + 'px';
        ember.style.left = Math.random() * 100 + '%';
        ember.style.animationDuration = Math.random() * 5 + 3 + 's';
        ember.style.animationDelay = Math.random() * 5 + 's';
        ember.style.opacity = Math.random() * 0.6 + 0.2;
        document.querySelector('.arena-background').appendChild(ember);
        setTimeout(() => { if(ember && ember.remove) ember.remove(); }, 8000);
    }
    setInterval(createEmber, 400);

    // -------- Interactive button behavior (cosmetic + progress simulation) --------
    const progressFill = document.getElementById('progressFill');
    const fileCountSpan = document.getElementById('fileCount');
    const readySpan = document.getElementById('readyStatus');
    let scanActive = false;
    let scanInterval = null;

    function updateProgress(percent, filesDone, totalFiles) {
        progressFill.style.width = percent + '%';
        fileCountSpan.innerText = `${filesDone}/${totalFiles} files`;
        if (percent >= 100) {
            readySpan.innerText = 'Ready';
            readySpan.style.color = '#aaffaa';
            if (scanInterval) clearInterval(scanInterval);
            scanActive = false;
        } else {
            readySpan.innerText = 'Scanning...';
            readySpan.style.color = '#ffaa66';
        }
    }

    function startFakeScan() {
        if (scanInterval) clearInterval(scanInterval);
        scanActive = true;
        let progress = 0;
        const total = 1240;
        updateProgress(0, 0, total);
        scanInterval = setInterval(() => {
            if (!scanActive) return;
            progress += Math.random() * 12 + 3;
            if (progress >= 100) {
                progress = 100;
                updateProgress(100, total, total);
                clearInterval(scanInterval);
                scanActive = false;
                readySpan.innerText = 'Ready';
                readySpan.style.color = '#aaffaa';
            } else {
                const filesDone = Math.floor((progress / 100) * total);
                updateProgress(progress, filesDone, total);
            }
        }, 300);
    }

    function stopFakeScan() {
        if (scanInterval) {
            clearInterval(scanInterval);
            scanInterval = null;
        }
        scanActive = false;
        readySpan.innerText = 'Paused';
        readySpan.style.color = '#ffaa66';
    }

    // Button event handlers (demo actions)
    document.getElementById('fullScanBtn').addEventListener('click', () => {
        startFakeScan();
    });
    document.getElementById('pauseBtn').addEventListener('click', () => {
        if (scanActive) {
            stopFakeScan();
        } else {
            startFakeScan();
        }
    });
    document.getElementById('installBtn').addEventListener('click', () => {
        readySpan.innerText = 'Selecting location...';
        setTimeout(() => { if(!scanActive) readySpan.innerText = 'Ready'; }, 1500);
    });
    document.getElementById('settingsBtn').addEventListener('click', () => {
        alert('Settings panel (demo) — customize launcher preferences');
    });
    document.getElementById('clearCacheBtn').addEventListener('click', () => {
        readySpan.innerText = 'Cache cleared';
        setTimeout(() => { if(!scanActive) readySpan.innerText = 'Ready'; }, 1200);
    });
    document.getElementById('viewLogsBtn').addEventListener('click', () => {
        alert('Launcher logs: [2025.04.06] Arena authentication passed.\nAll systems nominal.');
    });

    // -------- Dynamic color adjustment (real-time) --------
    const accentInput = document.getElementById('accentColor');
    const bgBaseInput = document.getElementById('bgBaseColor');
    const arenaBgDiv = document.getElementById('arenaBg');

    function updateColors() {
        const accent = accentInput.value;
        const bgBase = bgBaseInput.value;
        // Convert hex to RGB for radial gradient
        const r = parseInt(bgBase.slice(1,3), 16);
        const g = parseInt(bgBase.slice(3,5), 16);
        const b = parseInt(bgBase.slice(5,7), 16);
        const darker = `rgba(${Math.floor(r*0.4)}, ${Math.floor(g*0.2)}, ${Math.floor(b*0.2)}, 1)`;
        arenaBgDiv.style.background = `radial-gradient(ellipse at 50% 30%, ${bgBase} 0%, ${darker} 100%)`;
        
        // Update border glows, button borders, etc.
        document.querySelectorAll('.launcher-btn').forEach(btn => {
            btn.style.borderColor = `${accent}80`;
        });
        document.querySelector('.launcher-container').style.borderColor = `${accent}99`;
        document.querySelector('.launcher-container').style.boxShadow = `0 20px 40px rgba(0,0,0,0.5), 0 0 30px ${accent}30`;
        document.querySelector('.progress-fill').style.background = `linear-gradient(90deg, ${accent}, #ffcc88)`;
        document.querySelector('.column-left').style.borderRightColor = `${accent}60`;
        document.querySelector('.column-right').style.borderLeftColor = `${accent}60`;
        const titleElem = document.querySelector('.main-title');
        titleElem.style.background = `linear-gradient(135deg, #ffddbb, ${accent}, #aa3300)`;
        titleElem.style.webkitBackgroundClip = 'text';
        titleElem.style.backgroundClip = 'text';
    }

    accentInput.addEventListener('input', updateColors);
    bgBaseInput.addEventListener('input', updateColors);
    updateColors(); // apply defaults

    // Optional: small easter-egg console
    console.log("SWG - A Final Arena | Modern Launcher Background | Gladiator Edition");
</script>
</body>
</html>
