<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>SWG Returns Launcher</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

    :root {
      --radius: 12px;
      --gold: #FFD700;
      --green: #4CAF50;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      -webkit-app-region: no-drag;
    }

    #hyperspace-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: radial-gradient(ellipse at center, #0a0f1e 0%, #03050a 100%);
      pointer-events: none;
    }

    .background-wrapper {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      border-radius: var(--radius);
      z-index: 1;
      -webkit-app-region: drag;
    }

    .main-content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      -webkit-app-region: no-drag;
    }

    .window-controls {
      position: absolute;
      top: 15px;
      right: 15px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .win-button, .close-button {
      width: 34px;
      height: 30px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.45);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: no-drag;
    }
    .win-button:hover { background: rgba(255,255,255,0.10); }
    .close-button {
      background: rgba(255,0,0,.70);
      border: none;
      font-size: 18px;
    }
    .close-button:hover { background: rgba(255,0,0,.90); }

    .play-button {
      position: absolute;
      left: 5%;
      top: 50%;
      transform: translateY(-50%);
      width: min(120px, 12vw);
      height: min(120px, 12vw);
      border-radius: 50%;
      background: linear-gradient(45deg, rgba(0,0,0,.8), rgba(51,51,51,.8));
      border: 4px solid rgba(102,102,102,.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(16px, 4vw, 24px);
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      font-weight: bold;
      -webkit-app-region: no-drag;
    }
    .play-button:hover {
      transform: translateY(-50%) scale(1.05);
      border-color: var(--green);
    }

    .side-buttons {
      position: absolute;
      right: 3%;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 220px;
      width: 25vw;
      min-width: 160px;
    }

    .side-button, .mini-button, .paypal-donate {
      width: 100%;
      padding: 10px 0;
      text-align: center;
      border-radius: 8px;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1px;
      transition: 0.2s ease;
      cursor: pointer;
      font-size: clamp(10px, 1.8vw, 14px);
      -webkit-app-region: no-drag;
    }

    .side-button {
      background: linear-gradient(to bottom, rgba(0,0,0,.85), rgba(0,0,0,.95));
      border: 1px solid rgba(102,102,102,.5);
      color: var(--gold);
    }
    .side-button:hover {
      border-color: var(--green);
      color: var(--green);
      transform: translateY(-2px);
    }

    .mini-button {
      background: linear-gradient(to bottom, rgba(0,0,0,.85), rgba(0,0,0,.95));
      border: 1px solid rgba(102,102,102,.5);
      color: var(--gold);
      padding: 8px 0;
      font-size: clamp(9px, 1.6vw, 12px);
    }
    .mini-button:hover {
      border-color: var(--green);
      color: var(--green);
      transform: translateY(-1px);
    }

    .paypal-donate {
      background: linear-gradient(to bottom, #0070ba, #003087);
      border: 1px solid #003087;
      color: white;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .paypal-donate:hover {
      background: linear-gradient(to bottom, #0090fa, #0050c7);
      transform: translateY(-1px);
    }

    #current-directory {
      font-size: clamp(10px, 1.8vw, 12px);
      color: #aaa;
      word-break: break-all;
      text-align: center;
      margin: 8px 0;
      max-height: 60px;
      overflow-y: auto;
    }

    .info-panels {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      border-radius: 10px;
      padding: 8px 12px;
      backdrop-filter: blur(5px);
      border-left: 3px solid var(--green);
      font-size: clamp(10px, 1.8vw, 12px);
      color: #ddd;
      max-width: 280px;
      width: auto;
      z-index: 5;
      -webkit-app-region: no-drag;
    }
    .info-panels div {
      margin: 5px 0;
    }
    .info-label {
      color: var(--gold);
      font-weight: bold;
      display: inline-block;
      width: 80px;
    }
    .server-online { color: #4caf50; }
    .server-offline { color: #f44336; }
    .test-exe-btn {
      background: rgba(0,0,0,0.6);
      border: 1px solid var(--green);
      color: var(--green);
      padding: 2px 6px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 9px;
      margin-left: 6px;
      transition: 0.2s;
      -webkit-app-region: no-drag;
    }
    .test-exe-btn:hover {
      background: var(--green);
      color: black;
    }

    .progress-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      max-width: 900px;
      background: rgba(0,0,0,.75);
      padding: 12px;
      border-radius: 12px;
      -webkit-app-region: no-drag;
    }
    .progress-bar {
      height: 18px;
      background: rgba(0,0,0,.7);
      border-radius: 10px;
      overflow: hidden;
      margin: 6px 0;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--green), #66ff66);
      transition: width 0.3s ease;
    }
    .status-text {
      text-align: center;
      font-size: clamp(11px, 2vw, 14px);
      color: var(--green);
    }
    #download-speed {
      font-size: clamp(10px, 1.8vw, 12px);
      color: #66ff66;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      display: none;
      -webkit-app-region: no-drag;
    }
    .settings-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(20, 20, 20, 0.95);
      border: 2px solid var(--green);
      border-radius: 12px;
      padding: 20px;
      z-index: 1001;
      width: 90%;
      max-width: 420px;
      display: none;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      -webkit-app-region: no-drag;
    }
    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      border-bottom: 1px solid rgba(76, 175, 80, 0.5);
      padding-bottom: 8px;
    }
    .settings-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      color: var(--green);
    }
    .settings-close {
      background: rgba(255,0,0,.7);
      border: none;
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
    }
    .setting-item {
      margin-bottom: 15px;
      padding: 8px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
    }
    .setting-label {
      display: block;
      margin-bottom: 6px;
      color: var(--gold);
      font-size: 13px;
      font-family: 'Orbitron', sans-serif;
    }
    .setting-select {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(102,102,102,0.5);
      color: white;
    }
    .setting-item label {
      display: block;
      color: #ddd;
      font-size: 13px;
      cursor: pointer;
      margin: 4px 0;
    }
    .setting-checkbox {
      margin-right: 8px;
      accent-color: var(--green);
    }
    input[type="range"] {
      width: 100%;
      cursor: pointer;
      background: rgba(0,0,0,0.7);
      height: 4px;
      border-radius: 5px;
      -webkit-appearance: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--green);
      cursor: pointer;
    }

    @media (max-width: 800px) {
      .side-buttons { width: 32vw; min-width: 140px; right: 2%; }
      .play-button { left: 3%; width: 90px; height: 90px; font-size: 16px; }
      .info-panels { bottom: 10px; left: 10px; padding: 6px 10px; max-width: 240px; }
      .info-label { width: 70px; }
    }
    @media (max-width: 600px) {
      .side-buttons { width: 40vw; gap: 8px; }
      .play-button { width: 70px; height: 70px; font-size: 14px; }
      .progress-container { width: 90%; padding: 10px; }
    }
  </style>
</head>

<body>
  <canvas id="hyperspace-canvas"></canvas>
  <div class="background-wrapper"></div>

  <div class="modal-overlay" id="modal-overlay"></div>
  <div class="settings-modal" id="settings-modal">
    <div class="settings-header">
      <div class="settings-title">SETTINGS</div>
      <button class="settings-close" id="settings-close">×</button>
    </div>
    <div class="setting-item">
      <label class="setting-label">Scan Mode</label>
      <select class="setting-select" id="scan-mode-select">
        <option value="quick">Quick Scan</option>
        <option value="full">Full Scan</option>
      </select>
    </div>
    <div class="setting-item">
      <label><input type="checkbox" class="setting-checkbox" id="auto-launch-checkbox"> Auto-launch after scan</label>
    </div>
    <div class="setting-item">
      <label><input type="checkbox" class="setting-checkbox" id="auto-update-checkbox"> Auto-update launcher</label>
    </div>
    <div class="setting-item">
      <label><input type="checkbox" class="setting-checkbox" id="minimize-to-tray-checkbox"> Minimize to system tray</label>
    </div>
    <div class="setting-item">
      <label class="setting-label">Connection Timeout (seconds)</label>
      <input type="number" class="setting-select" id="timeout-input" min="10" max="120" value="30">
    </div>
    <div class="setting-item">
      <label class="setting-label">Max In‑Game FPS</label>
      <input type="range" id="max-fps-slider" min="30" max="144" step="1" value="60">
      <span id="max-fps-value" style="color: var(--gold); display: inline-block; margin-top: 4px;">60 FPS</span>
    </div>
    <div class="setting-item">
      <label class="setting-label">Max Camera Zoom</label>
      <input type="range" id="camera-zoom-slider" min="1" max="20" step="1" value="10">
      <span id="camera-zoom-value" style="color: var(--gold); display: inline-block; margin-top: 4px;">10</span>
    </div>
    <div class="setting-item">
      <label class="setting-label">UI Zoom (%)</label>
      <input type="range" id="zoom-slider" min="50" max="150" step="5" value="100">
      <span id="zoom-value" style="color: var(--gold); display: inline-block; margin-top: 4px;">100%</span>
    </div>
    <button class="side-button" id="save-settings" style="margin-top: 15px; width: 100%;">SAVE SETTINGS</button>
  </div>

  <div class="main-content">
    <div class="window-controls">
      <button class="win-button" id="minimize-button" title="Minimize">—</button>
      <button class="win-button" id="maximize-button" title="Maximize/Restore">▢</button>
      <button class="close-button" id="close-button" title="Close">×</button>
    </div>

    <div class="play-button" id="play-button">PLAY</div>

    <div class="side-buttons">
      <button class="side-button" id="quick-scan">QUICK SCAN</button>
      <button class="side-button" id="full-scan">FULL SCAN (RECHECK ALL)</button>
      <button class="side-button" id="repair-button">REPAIR FILES</button>
      <button class="side-button" id="install-location">INSTALL LOCATION</button>
      <button class="side-button" id="settings-button">SETTINGS</button>
      <div id="current-directory"></div>
      <button class="mini-button" id="pause-button">PAUSE SCAN</button>
      <button class="mini-button" id="clear-cache">CLEAR CACHE</button>
      <button class="mini-button" id="view-logs">VIEW LOGS</button>
      <button class="mini-button" id="view-log-viewer">OPEN LOG VIEWER</button>
      <button class="paypal-donate" id="donate-button">
        <span>PayPal</span> <span>DONATE</span>
      </button>
    </div>

    <div class="info-panels">
      <div><span class="info-label">Server:</span> <span id="server-status">Checking...</span> <button id="refresh-server" class="test-exe-btn">⟳</button></div>
      <div><span class="info-label">Game ver:</span> <span id="game-version">--</span> <button id="check-updates" class="test-exe-btn">Check</button></div>
      <div><span class="info-label">SWGEmu.exe:</span> <span id="exe-status">Not tested</span> <button id="test-exe-button" class="test-exe-btn">Test</button></div>
    </div>

    <div class="progress-container">
      <div class="progress-bar"><div id="total-progress" class="progress-fill"></div></div>
      <div id="total-status" class="status-text">0/0 files</div>
      <div class="progress-bar"><div id="file-progress" class="progress-fill"></div></div>
      <div id="status" class="status-text">Ready</div>
      <div id="download-speed" class="status-text"></div>
    </div>
  </div>

  <script src="renderer.js"></script>
  <script>
    (function() {
      const canvas = document.getElementById('hyperspace-canvas');
      const ctx = canvas.getContext('2d');
      let width, height;
      let stars = [];
      let numStars = 400; // increased from 300 for more density
      let speed = 6;      // slightly faster

      function initStars() {
        stars = [];
        for (let i = 0; i < numStars; i++) {
          stars.push({
            x: Math.random() * width * 2 - width,
            y: Math.random() * height * 2 - height,
            z: Math.random() * width,
            // random base size between 1 and 3 (will be multiplied later)
            size: 1 + Math.random() * 2,
            speed: 1 + Math.random() * 4, // varied speeds
            // random brightness offset for variety
            brightness: 0.6 + Math.random() * 0.4
          });
        }
      }

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        initStars();
      }

      function draw() {
        // Clear with a semi-transparent black for trailing effect
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(0, 0, width, height);
        
        for (let i = 0; i < stars.length; i++) {
          const s = stars[i];
          // Move star toward center (warp effect)
          s.z -= s.speed * speed;
          if (s.z <= 0) {
            s.z = width;
            s.x = Math.random() * width * 2 - width;
            s.y = Math.random() * height * 2 - height;
          }
          
          // Project to screen
          const factor = s.z / width;
          const x = s.x / factor + width / 2;
          const y = s.y / factor + height / 2;
          
          // Star size: larger when closer (small z), but cap at 12px
          let r = (1 - factor) * 12;
          if (r < 0.5) r = 0.5;
          // Apply random size variation
          r *= s.size;
          
          // Brightness: brighter when closer, plus random variation
          let alpha = (1 - factor) * 0.9 + 0.1;
          alpha *= s.brightness;
          if (alpha > 0.9) alpha = 0.9;
          
          // Draw star with a glow effect (larger transparent outer circle)
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 240, 200, ${alpha * 0.5})`;
          ctx.fill();
          
          ctx.beginPath();
          ctx.arc(x, y, r * 0.6, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
          ctx.fill();
        }
        
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', resize);
      resize();
      draw();
    })();
  </script>
</body>
</html>
