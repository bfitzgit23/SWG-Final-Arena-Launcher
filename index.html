<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>SWG Returns Launcher</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

    :root {
      --radius: 12px;
      --gold: #FFD700;
      --green: #4CAF50;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      -webkit-app-region: no-drag;
    }

    /* Background - covers entire window, draggable */
    .background-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('./img/background.png') no-repeat center center;
      background-size: cover;
      border-radius: var(--radius);
      z-index: 1;
      -webkit-app-region: drag;
    }

    /* Main content layer */
    .main-content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Window buttons - always top right */
    .window-controls {
      position: absolute;
      top: 15px;
      right: 15px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .win-button, .close-button {
      width: 34px;
      height: 30px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.45);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .win-button:hover { background: rgba(255,255,255,0.10); }
    .close-button {
      background: rgba(255,0,0,.70);
      border: none;
      font-size: 18px;
    }
    .close-button:hover { background: rgba(255,0,0,.90); }

    /* Main PLAY button - centered left, responsive */
    .play-button {
      position: absolute;
      left: 5%;
      top: 50%;
      transform: translateY(-50%);
      width: min(120px, 15vw);
      height: min(120px, 15vw);
      border-radius: 50%;
      background: linear-gradient(45deg, rgba(0,0,0,.8), rgba(51,51,51,.8));
      border: 4px solid rgba(102,102,102,.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(16px, 5vw, 24px);
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      font-weight: bold;
    }
    .play-button:hover {
      transform: translateY(-50%) scale(1.05);
      border-color: var(--green);
    }

    /* Right side buttons group */
    .side-buttons {
      position: absolute;
      right: 3%;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 220px;
      width: 25vw;
      min-width: 160px;
    }

    .side-button, .mini-button, .paypal-donate {
      width: 100%;
      padding: 12px 0;
      text-align: center;
      border-radius: 8px;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1px;
      transition: 0.2s ease;
      cursor: pointer;
      font-size: clamp(10px, 2vw, 14px);
    }

    .side-button {
      background: linear-gradient(to bottom, rgba(0,0,0,.85), rgba(0,0,0,.95));
      border: 1px solid rgba(102,102,102,.5);
      color: var(--gold);
    }
    .side-button:hover {
      border-color: var(--green);
      color: var(--green);
      transform: translateY(-2px);
    }

    .mini-button {
      background: linear-gradient(to bottom, rgba(0,0,0,.85), rgba(0,0,0,.95));
      border: 1px solid rgba(102,102,102,.5);
      color: var(--gold);
      padding: 8px 0;
      font-size: clamp(9px, 1.8vw, 12px);
    }
    .mini-button:hover {
      border-color: var(--green);
      color: var(--green);
      transform: translateY(-1px);
    }

    .paypal-donate {
      background: linear-gradient(to bottom, #0070ba, #003087);
      border: 1px solid #003087;
      color: white;
      padding: 10px 0;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .paypal-donate:hover {
      background: linear-gradient(to bottom, #0090fa, #0050c7);
      transform: translateY(-1px);
    }

    /* Current directory text */
    #current-directory {
      font-size: clamp(10px, 1.8vw, 12px);
      color: #aaa;
      word-break: break-all;
      text-align: center;
      margin: 8px 0;
      max-height: 60px;
      overflow-y: auto;
    }

    /* Info panels (server, version, test) - bottom left */
    .info-panels {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      border-radius: 10px;
      padding: 10px 15px;
      backdrop-filter: blur(5px);
      border-left: 3px solid var(--green);
      font-size: clamp(10px, 1.8vw, 12px);
      color: #ddd;
      max-width: 280px;
      width: auto;
      z-index: 5;
    }
    .info-panels div {
      margin: 6px 0;
    }
    .info-label {
      color: var(--gold);
      font-weight: bold;
      display: inline-block;
      width: 70px;
    }
    .server-online { color: #4caf50; }
    .server-offline { color: #f44336; }
    .test-exe-btn {
      background: rgba(0,0,0,0.6);
      border: 1px solid var(--green);
      color: var(--green);
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
      margin-left: 8px;
      transition: 0.2s;
    }
    .test-exe-btn:hover {
      background: var(--green);
      color: black;
    }

    /* Progress container - bottom center, responsive width */
    .progress-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      max-width: 900px;
      background: rgba(0,0,0,.75);
      padding: 15px;
      border-radius: 12px;
      -webkit-app-region: no-drag;
    }
    .progress-bar {
      height: 18px;
      background: rgba(0,0,0,.7);
      border-radius: 10px;
      overflow: hidden;
      margin: 8px 0;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--green), #66ff66);
      transition: width 0.3s ease;
    }
    .status-text {
      text-align: center;
      font-size: clamp(11px, 2vw, 14px);
      color: var(--green);
    }
    #download-speed {
      font-size: clamp(10px, 1.8vw, 12px);
      color: #66ff66;
    }

    /* Modal remains mostly same, just ensure it's responsive */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      display: none;
    }
    .settings-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(20, 20, 20, 0.95);
      border: 2px solid var(--green);
      border-radius: 12px;
      padding: 25px;
      z-index: 1001;
      width: 90%;
      max-width: 420px;
      display: none;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    /* ... rest of modal styles unchanged (keep your existing) ... */
    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(76, 175, 80, 0.5);
      padding-bottom: 10px;
    }
    .settings-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      color: var(--green);
    }
    .settings-close {
      background: rgba(255,0,0,.7);
      border: none;
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
    }
    .setting-item {
      margin-bottom: 18px;
      padding: 10px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
    }
    .setting-label {
      display: block;
      margin-bottom: 8px;
      color: var(--gold);
      font-size: 14px;
      font-family: 'Orbitron', sans-serif;
    }
    .setting-select {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(102,102,102,0.5);
      color: white;
    }
    .setting-checkbox {
      margin-right: 10px;
      accent-color: var(--green);
    }

    /* Responsive adjustments for very small screens */
    @media (max-width: 800px) {
      .side-buttons {
        width: 35vw;
        min-width: 140px;
        right: 2%;
      }
      .play-button {
        left: 3%;
        width: 90px;
        height: 90px;
        font-size: 16px;
      }
      .info-panels {
        bottom: 10px;
        left: 10px;
        padding: 6px 10px;
        max-width: 240px;
      }
      .info-label {
        width: 60px;
      }
    }

    @media (max-width: 600px) {
      .side-buttons {
        width: 40vw;
        gap: 8px;
      }
      .play-button {
        width: 70px;
        height: 70px;
        font-size: 14px;
      }
      .info-panels {
        font-size: 9px;
      }
      .progress-container {
        width: 90%;
        padding: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="background-wrapper"></div>

  <!-- Settings Modal (same as before) -->
  <div class="modal-overlay" id="modal-overlay"></div>
  <div class="settings-modal" id="settings-modal">
    <div class="settings-header">
      <div class="settings-title">SETTINGS</div>
      <button class="settings-close" id="settings-close">×</button>
    </div>
    <div class="setting-item">
      <label class="setting-label">Scan Mode</label>
      <select class="setting-select" id="scan-mode-select">
        <option value="quick">Quick Scan</option>
        <option value="full">Full Scan</option>
      </select>
    </div>
    <div class="setting-item">
      <label><input type="checkbox" class="setting-checkbox" id="auto-launch-checkbox"> Auto-launch after scan</label>
    </div>
    <div class="setting-item">
      <label><input type="checkbox" class="setting-checkbox" id="auto-update-checkbox"> Auto-update launcher</label>
    </div>
    <div class="setting-item">
      <label><input type="checkbox" class="setting-checkbox" id="minimize-to-tray-checkbox"> Minimize to system tray</label>
    </div>
    <div class="setting-item">
      <label class="setting-label">Connection Timeout (seconds)</label>
      <input type="number" class="setting-select" id="timeout-input" min="10" max="120" value="30">
    </div>
    <button class="side-button" id="save-settings" style="margin-top: 20px; width: 100%;">SAVE SETTINGS</button>
  </div>

  <div class="main-content">
    <!-- Window controls -->
    <div class="window-controls">
      <button class="win-button" id="minimize-button" title="Minimize">—</button>
      <button class="win-button" id="maximize-button" title="Maximize/Restore">▢</button>
      <button class="close-button" id="close-button" title="Close">×</button>
    </div>

    <!-- Main PLAY button -->
    <div class="play-button" id="play-button">PLAY</div>

    <!-- Right side buttons -->
    <div class="side-buttons">
      <button class="side-button" id="quick-scan">QUICK SCAN</button>
      <button class="side-button" id="full-scan">FULL SCAN</button>
      <button class="side-button" id="install-location">INSTALL LOCATION</button>
      <button class="side-button" id="settings-button">SETTINGS</button>
      <div id="current-directory"></div>
      <button class="mini-button" id="pause-button">PAUSE SCAN</button>
      <button class="mini-button" id="clear-cache">CLEAR CACHE</button>
      <button class="mini-button" id="view-logs">VIEW LOGS</button>
      <button class="mini-button" id="view-log-viewer">OPEN LOG VIEWER</button>
      <button class="paypal-donate" id="donate-button">
        <span>PayPal</span> <span>DONATE</span>
      </button>
    </div>

    <!-- Info panels -->
    <div class="info-panels">
      <div><span class="info-label">Server:</span> <span id="server-status">Checking...</span> <button id="refresh-server" class="test-exe-btn">⟳</button></div>
      <div><span class="info-label">Game ver:</span> <span id="game-version">--</span> <button id="check-updates" class="test-exe-btn">Check</button></div>
      <div><span class="info-label">SWGEmu.exe:</span> <span id="exe-status">Not tested</span> <button id="test-exe-button" class="test-exe-btn">Test</button></div>
    </div>

    <!-- Progress area -->
    <div class="progress-container">
      <div class="progress-bar"><div id="total-progress" class="progress-fill"></div></div>
      <div id="total-status" class="status-text">0/0 files</div>
      <div class="progress-bar"><div id="file-progress" class="progress-fill"></div></div>
      <div id="status" class="status-text">Ready</div>
      <div id="download-speed" class="status-text"></div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
